apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ps-dashboard
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/ssafy15-data/study_dashboard.git
    targetRevision: main
    path: charts/ps-dashboard
    helm:
      valueFiles:
        - values.yaml
        - values-prod.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: ps-dashboard
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

